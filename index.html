<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <div>
        <div class="background">
            <div class="bmi-container  ps-5">
                <div class="left-card ">
                    <h1>Calculate Body Mass Index</h1>
                    <form>
                        <div class="mb-3" style="width: 300px;">
                            <label style="margin-left: 10px;" for="">Age</label>
                            <input style="margin-top: 10px;" type="age" class="form-control" id="inputage"
                                placeholder="Enter Your Age">
                        </div>
                        <label class="form-label">Gender</label><br>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="gender" id="male" value="male">
                            <label class="form-check-label" for="male">Male</label>
                        </div>

                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="gender" id="female" value="female">
                            <label class="form-check-label" for="female">Female</label>
                        </div>
                          <div class="mb-3" style="width: 300px;">
                            <label style="margin-left: 10px;" for="">Height</label>
                            <input style="margin-top: 10px;" type="age" class="form-control" id="inputheight"
                                placeholder="Cm">
                        </div>
                          <div class="mb-3" style="width: 300px;">
                            <label style="margin-left: 10px;" for="">Weight</label>
                            <input style="margin-top: 10px;" type="age" class="form-control" id="inputweight"
                                placeholder="Kg">
                        </div>
                        <button type="submit" class="btn btn-dark ms-5">Calculate Now</button>
                    </form>
                </div>
                <div class="right-card">
                    <div id="output">

                    </div>
                </div>

            </div>
        </div>
    </div>

</body>
<script src="./script.js"></script>

</html>
